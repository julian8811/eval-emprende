<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EvalEmprende | Historial</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="premium-container">
        <header style="margin-bottom: 3rem;">
            <a href="index.html" style="text-decoration: none; color: var(--primary); font-weight: 600;">← Volver al
                Inicio</a>
            <h1 style="font-size: 2.5rem; margin-top: 1.5rem;">Historial de Evaluaciones</h1>
            <p style="color: var(--text-muted);">Gestiona y revisa los diagnósticos realizados en este equipo.</p>
        </header>

        <div id="history-list" class="card-grid">
            <!-- Items injected via JS -->
        </div>

        <div id="empty-state" style="display: none; text-align: center; padding: 5rem 0;">
            <div style="font-size: 4rem; margin-bottom: 1rem;">📂</div>
            <h3>No hay evaluaciones guardadas</h3>
            <p style="color: var(--text_muted); margin-bottom: 2rem;">Inicia tu primera evaluación para verla aquí.</p>
            <a href="evaluation.html" class="btn-premium btn-primary">Comenzar Ahora</a>
        </div>
    </div>

    <nav class="floating-nav">
        <a href="index.html" class="nav-link">Inicio</a>
        <a href="evaluation.html" class="nav-link">Evaluación</a>
        <a href="history.html" class="nav-link active">Historial</a>
    </nav>

    <script src="app.js"></script>
    <script>
        const history = engine.loadHistory();
        const container = document.getElementById('history-list');

        if (history.length === 0) {
            document.getElementById('empty-state').style.display = 'block';
        } else {
            history.forEach(item => {
                const card = document.createElement('div');
                card.className = 'premium-card';
                card.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                        <div>
                            <div style="font-size: 0.7rem; text-transform: uppercase; color: var(--text-muted);">${new Date(item.timestamp).toLocaleDateString()}</div>
                            <h3 style="margin: 0.25rem 0;">${item.data.nombre_emprendimiento}</h3>
                        </div>
                        <div style="background: var(--primary); color: white; padding: 0.25rem 0.75rem; border-radius: 99px; font-weight: 800; font-size: 0.9rem;">
                            ${item.promedioGeneral}
                        </div>
                    </div>
                    <p style="font-size: 0.85rem; color: var(--text-muted);">Responsable: ${item.data.nombre_responsable}</p>
                    <div style="margin-top: 1.5rem; display: flex; gap: 1rem;">
                        <button onclick="viewResult('${item.id}')" class="btn-premium btn-primary" style="flex: 1; font-size: 0.75rem;">Ver Resultados</button>
                        <button onclick="deleteEval('${item.id}')" style="background: #fee2e2; color: #b91c1c; border: none; padding: 0.5rem; border-radius: var(--radius-sm); cursor: pointer;">🗑️</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function viewResult(id) {
            const item = history.find(h => h.id === id);
            localStorage.setItem('eval_emprende_latest', JSON.stringify(item));
            window.location.href = 'results.html';
        }

        function deleteEval(id) {
            if (confirm('¿Estás seguro de que deseas eliminar esta evaluación?')) {
                const newHistory = history.filter(h => h.id !== id);
                localStorage.setItem('eval_emprende_history', JSON.stringify(newHistory));
                location.reload();
            }
        }
    </script>
</body>

</html>
